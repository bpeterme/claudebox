name: Release

on:
  push:
    branches: [main]

jobs:
  release:
    name: Bump version and create GitHub release
    runs-on: ubuntu-latest
    if: github.actor != 'github-actions[bot]'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5

      - name: Bump minor version
        id: version
        run: |
          version=$(cat VERSION)
          major=$(echo "$version" | cut -d. -f1)
          minor=$(echo "$version" | cut -d. -f2)
          new_version="$major.$((minor + 1)).0"
          echo "$new_version" > VERSION
          sed -i "s/^_CBOX_VERSION=\"[^\"]*\"/_CBOX_VERSION=\"$new_version\"/" cbox.sh
          echo "value=$new_version" >> "$GITHUB_OUTPUT"

      - name: Commit and push version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add VERSION cbox.sh
          git commit -m "Release v${{ steps.version.outputs.value }}"
          git push

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "v${{ steps.version.outputs.value }}" \
            --title "v${{ steps.version.outputs.value }}" \
            --generate-notes \
            --latest
