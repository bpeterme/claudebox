name: Test

on:
  push:
    branches: [dev, main]
  pull_request:
    branches: [main]

jobs:
  unit:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Install bats
        run: sudo apt-get install -y bats
      - name: Run unit tests
        run: bats tests/unit.bats

  integration:
    name: Integration tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Install bats
        run: sudo apt-get install -y bats
      - name: Run integration tests
        run: bats tests/integration.bats
