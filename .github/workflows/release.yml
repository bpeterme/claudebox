name: Release

on:
  push:
    branches: [main]

jobs:
  release:
    name: Tag, create GitHub release, and update Homebrew tap
    runs-on: ubuntu-latest
    if: github.actor != 'github-actions[bot]'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Compute CalVer version
        id: version
        run: |
          today=$(date -u +%Y.%m.%d)
          highest=$(git tag -l "${today}.*" | sed "s/^${today}\.//" | sort -n | tail -1)
          if [[ -z "$highest" ]]; then
            n=0
          else
            n=$((highest + 1))
          fi
          echo "value=${today}.${n}" >> "$GITHUB_OUTPUT"

      - name: Create and push tag
        run: |
          git tag "${{ steps.version.outputs.value }}"
          git push origin "${{ steps.version.outputs.value }}"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ steps.version.outputs.value }}" \
            --title "${{ steps.version.outputs.value }}" \
            --generate-notes \
            --latest

      - name: Compute release tarball SHA256
        id: sha256
        run: |
          version="${{ steps.version.outputs.value }}"
          url="https://github.com/bpeterme/claudebox/archive/refs/tags/${version}.tar.gz"
          sleep 5
          sha=$(curl -fsSL "$url" | sha256sum | awk '{print $1}')
          echo "value=${sha}" >> "$GITHUB_OUTPUT"
          echo "url=${url}" >> "$GITHUB_OUTPUT"

      - name: Update Homebrew tap formula
        env:
          TAP_TOKEN: ${{ secrets.TAP_GITHUB_TOKEN }}
        run: |
          version="${{ steps.version.outputs.value }}"
          sha="${{ steps.sha256.outputs.value }}"
          url="${{ steps.sha256.outputs.url }}"
          git clone "https://x-access-token:${TAP_TOKEN}@github.com/bpeterme/homebrew-claudebox.git" tap
          cd tap
          sed -i "s|url \".*\"|url \"${url}\"|" Formula/claudebox.rb
          sed -i "s/sha256 \"[^\"]*\"/sha256 \"${sha}\"/" Formula/claudebox.rb
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/claudebox.rb
          git commit -m "claudebox ${version}"
          git push
