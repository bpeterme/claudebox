name: Release

on:
  push:
    branches: [main]

jobs:
  release:
    name: Stamp CalVer, tag, and create GitHub release
    runs-on: ubuntu-latest
    if: github.actor != 'github-actions[bot]'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Compute CalVer version
        id: version
        run: |
          today=$(date -u +%Y.%m.%d)
          highest=$(git tag -l "${today}.*" | sed "s/^${today}\.//" | sort -n | tail -1)
          if [[ -z "$highest" ]]; then
            n=0
          else
            n=$((highest + 1))
          fi
          echo "value=${today}.${n}" >> "$GITHUB_OUTPUT"

      - name: Stamp version into files
        run: |
          version="${{ steps.version.outputs.value }}"
          echo "$version" > VERSION
          sed -i "s/^_CBOX_VERSION=\"[^\"]*\"/_CBOX_VERSION=\"$version\"/" cbox.sh

      - name: Commit and push version stamp
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add VERSION cbox.sh
          git commit -m "Release ${{ steps.version.outputs.value }}"
          git tag "${{ steps.version.outputs.value }}"
          git push origin main --follow-tags

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ steps.version.outputs.value }}" \
            --title "${{ steps.version.outputs.value }}" \
            --generate-notes \
            --latest
